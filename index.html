<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fisio SERMEF</title>
    <style>
        :root { --primary: #2c3e50; --accent: #27ae60; --bg: #f4f7f6; --blue: #3498db; --orange: #e67e22; }
        body { font-family: sans-serif; background: var(--bg); padding: 10px; color: var(--primary); margin:0; }
        .card { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 15px; }
        .timer { font-size: 2.5rem; text-align: center; font-weight: bold; color: var(--accent); margin: 10px 0; }
        .btn { display: block; width: 100%; padding: 15px; border: none; border-radius: 8px; font-size: 1rem; font-weight: bold; cursor: pointer; margin-bottom: 10px; text-align: center; }
        .btn-routine { background: var(--primary); color: white; }
        .btn-start { background: var(--accent); color: white; }
        .btn-done { background: #eee; color: #777; border: 1px solid #ddd; width: 80px; margin: 0; font-size: 0.8rem; }
        .btn-done.active { background: #d4edda; color: #155724; border: 2px solid var(--accent); }
        .btn-sync { background: var(--blue); color: white; margin-top: 20px; display: none; }
        .ex-item { padding: 15px 0; border-bottom: 1px solid #eee; }
        .ex-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .ex-name { font-weight: bold; display: block; font-size: 1.1rem; }
        .ex-reps { font-size: 0.9rem; color: var(--orange); font-weight: bold; }
        .video-container { width: 100%; height: 200px; background: #000; border-radius: 8px; overflow: hidden; margin-top: 10px; }
        iframe { width: 100%; height: 100%; border: none; }
        .step-title { font-size: 0.9rem; color: #666; text-transform: uppercase; margin-bottom: 10px; font-weight: bold; }
    </style>
</head>
<body>
    <div style="padding:10px">
        <h1 style="text-align:center">🏋️ Mi Fisio Personal</h1>

        <div class="card" id="paso1">
            <div class="step-title">1. Elige la zona</div>
            <button class="btn btn-routine" onclick="cargar('Lumbar')">🦴 Espalda (Lumbar)</button>
            <button class="btn btn-routine" onclick="cargar('Rodilla')">🦵 Rodilla (Gonartrosis)</button>
        </div>

        <div id="paso2" style="display:none" class="card">
            <div class="step-title">2. ¿Qué ejercicios harás hoy?</div>
            <div id="lista-seleccion"></div>
            <button class="btn btn-routine" style="background:var(--orange); margin-top:20px" onclick="confirmarSeleccion()">CONFIRMAR SELECCIÓN</button>
        </div>

        <div id="paso3" style="display:none">
            <div class="card">
                <div class="step-title">3. Cronómetro</div>
                <div class="timer" id="display">00:00</div>
                <button class="btn btn-start" id="startBtn" onclick="toggleTimer()">INICIAR SESIÓN</button>
            </div>
            <div id="lista-entrenamiento"></div>
            <button class="btn btn-sync" id="syncBtn" onclick="finalizar()">FINALIZAR Y ENVIAR AL GEM</button>
        </div>
    </div>

    <script>
        let segs = 0, interval, running = false, seleccionados = [], actual = "";
        
        // URL base de los vídeos (ajustada para intentar embeber)
        const vBase = "https://www.sermef-ejercicios.org/index.php?id=80&p=";
        
        const datos = {
            'Lumbar': [
                {n: "Estiramiento lumbosacro", r: "3 reps", v: vBase+"p-15-73&a=estiramiento-lumbosacro"},
                {n: "Isquiotibiales", r: "3 reps", v: vBase+"p-15-73&a=estiramiento-isquiotibiales"},
                {n: "Puente con pierna", r: "1x10", v: vBase+"p-15-73&a=puente-con-una-pierna"},
                {n: "Abdominales", r: "3x10", v: vBase+"p-15-73&a=abdominales-con-manos-en-nuca"},
                {n: "Abdom. Cruzados", r: "1x10", v: vBase+"p-15-73&a=abdominales-cruzados"},
                {n: "Brazo-Pierna", r: "1x10", v: vBase+"p-15-73&a=extension-de-brazo-y-pierna-alternos"}
            ],
            'Rodilla': [
                {n: "Extensión sentado", r: "3x10", v: vBase+"p-14-100&a=extension-de-rodilla-en-sedestacion"},
                {n: "Levantarse silla", r: "1x10", v: vBase+"p-14-100&a=levantarse-y-sentarse-en-una-silla"},
                {n: "Sentadilla pared", r: "3x10", v: vBase+"p-14-100&a=sentadilla-en-la-pared"},
                {n: "Talones", r: "3x10", v: vBase+"p-14-100&a=elevacion-de-talones"},
                {n: "Estiramiento cuádriceps", r: "3 reps", v: vBase+"p-14-100&a=estiramiento-de-cuadriceps"},
                {n: "Elevación lateral", r: "3x10", v: vBase+"p-14-100&a=elevacion-lateral-de-la-pierna"}
            ]
        };

        function cargar(tipo) {
            actual = tipo;
            seleccionados = [];
            const lista = document.getElementById('lista-seleccion');
            lista.innerHTML = "";
            datos[tipo].forEach((ex, i) => {
                lista.innerHTML += `
                <div class="ex-header" style="padding:10px 0; border-bottom:1px solid #eee">
                    <div><span class="ex-name">${ex.n}</span><span class="ex-reps">${ex.r}</span></div>
                    <button class="btn btn-done" id="sel-${i}" onclick="toggleSeleccion(${i},'${ex.n}')">ELEGIR</button>
                </div>`;
            });
            document.getElementById('paso1').style.display = "none";
            document.getElementById('paso2').style.display = "block";
        }

        function toggleSeleccion(id, nombre) {
            const btn = document.getElementById('sel-'+id);
            const index = seleccionados.indexOf(nombre);
            if(index === -1) {
                seleccionados.push(nombre); btn.classList.add('active'); btn.innerText = "SÍ";
            } else {
                seleccionados.splice(index, 1); btn.classList.remove('active'); btn.innerText = "ELEGIR";
            }
        }

        function confirmarSeleccion() {
            if(seleccionados.length === 0) return alert("Selecciona algún ejercicio");
            const listaEntr = document.getElementById('lista-entrenamiento');
            listaEntr.innerHTML = "";
            
            datos[actual].filter(ex => seleccionados.includes(ex.n)).forEach(ex => {
                listaEntr.innerHTML += `
                <div class="card">
                    <span class="ex-name">${ex.n}</span>
                    <span class="ex-reps">${ex.r}</span>
                    <div class="video-container">
                        <iframe src="${ex.v}"></iframe>
                    </div>
                </div>`;
            });
            document.getElementById('paso2').style.display = "none";
            document.getElementById('paso3').style.display = "block";
        }

        function toggleTimer() {
            if (!running) {
                interval = setInterval(() => {
                    segs++;
                    let m = Math.floor(segs/60).toString().padStart(2,'0');
                    let s = (segs%60).toString().padStart(2,'0');
                    document.getElementById('display').innerText = m+":"+s;
                }, 1000);
                document.getElementById('startBtn').innerText = "PAUSAR";
                document.getElementById('syncBtn').style.display = "block";
                running = true;
            } else {
                clearInterval(interval);
                document.getElementById('startBtn').innerText = "CONTINUAR";
                running = false;
            }
        }

        function finalizar() {
            const t = document.getElementById('display').innerText;
            const res = `SESIÓN: ${actual}. Tiempo: ${t}. Ejercicios hechos: ${seleccionados.join(', ')}`;
            navigator.clipboard.writeText(res).then(() => {
                alert("Copiado. Pégalo en el Gem.");
                window.location.href = "https://gemini.google.com/gem/c5912f79c9fe/efca5a411262c317";
            });
        }
    </script>
</body>
</html>
