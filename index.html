<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fisio SERMEF</title>
    <style>
        body { font-family: sans-serif; background: #f4f7f6; padding: 15px; color: #2c3e50; }
        .card { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 15px; }
        .timer { font-size: 2.5rem; text-align: center; font-weight: bold; color: #27ae60; margin: 10px 0; }
        .btn { display: block; width: 100%; padding: 15px; border: none; border-radius: 8px; font-size: 1rem; font-weight: bold; cursor: pointer; margin-bottom: 10px; }
        .btn-start { background: #27ae60; color: white; }
        .btn-routine { background: #34495e; color: white; }
        .btn-done { background: #eee; color: #777; border: 1px solid #ddd; }
        .btn-done.active { background: #d4edda; color: #155724; border: 2px solid #27ae60; }
        .btn-sync { background: #3498db; color: white; margin-top: 20px; }
        .ex-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #eee; }
    </style>
</head>
<body>
    <h1>🏋️ Mi Fisio</h1>
    <div class="card">
        <div class="timer" id="display">00:00</div>
        <button class="btn btn-start" id="startBtn" onclick="toggleTimer()">INICIAR SESIÓN</button>
    </div>
    <div class="card">
        <button class="btn btn-routine" onclick="cargar('Lumbar')">🦴 Espalda</button>
        <button class="btn btn-routine" onclick="cargar('Rodilla')">🦵 Rodilla</button>
    </div>
    <div id="area-ejercicios" style="display:none" class="card">
        <h3 id="titulo"></h3>
        <div id="lista"></div>
        <button class="btn btn-sync" onclick="finalizar()">FINALIZAR Y ENVIAR</button>
    </div>
    <script>
        let segs = 0, interval, running = false, completados = [], actual = "";
        const datos = {
            'Lumbar': ["Estiramiento lumbosacro", "Isquiotibiales", "Puente con pierna", "Abdominales", "Abdom. Cruzados", "Brazo-Pierna"],
            'Rodilla': ["Extensión sentado", "Levantarse silla", "Sentadilla pared", "Talones", "Estiramiento cuádriceps", "Elevación lateral"]
        };
        function cargar(tipo) {
            actual = tipo;
            document.getElementById('titulo').innerText = "Rutina " + tipo;
            const lista = document.getElementById('lista');
            lista.innerHTML = "";
            completados = [];
            datos[tipo].forEach((ex, i) => {
                lista.innerHTML += `<div class="ex-item"><span>${ex}</span><button class="btn btn-done" id="e${i}" style="width:60px" onclick="marcar(${i},'${ex}')">OK</button></div>`;
            });
            document.getElementById('area-ejercicios').style.display = "block";
        }
        function marcar(id, nombre) {
            document.getElementById('e'+id).classList.toggle('active');
            completados.push(nombre);
        }
        function toggleTimer() {
            if (!running) {
                interval = setInterval(() => {
                    segs++;
                    let m = Math.floor(segs/60).toString().padStart(2,'0');
                    let s = (segs%60).toString().padStart(2,'0');
                    document.getElementById('display').innerText = m+":"+s;
                }, 1000);
                document.getElementById('startBtn').innerText = "PAUSAR";
                running = true;
            } else {
                clearInterval(interval);
                document.getElementById('startBtn').innerText = "CONTINUAR";
                running = false;
            }
        }
        function finalizar() {
            const t = document.getElementById('display').innerText;
            const res = `SESIÓN: ${actual}. Tiempo: ${t}. Ejercicios: ${completados.join(', ')}`;
            navigator.clipboard.writeText(res).then(() => {
                alert("Copiado. Pégalo en el Gem ahora.");
                window.location.href = "https://gemini.google.com/gem/c5912f79c9fe/efca5a411262c317";
            });
        }
    </script>
</body>
</html>
